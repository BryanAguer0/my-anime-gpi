<div class="flex flex-col justify-center items-center max-w-4xl m-auto">
    <div class="flex gap-4 w-full mb-4">
    <input class="px-4 py-2 border border-blue-500 rounded-md" type="text" [value]="text()" (input)="text.set($event.target.value)"> {{text()}}
    <button class="px-4 py-2 border border-blue-500 rounded-md" (click)="addToDo()">Add</button> 
    </div>
