<div class="p-4">
    <div class="grid grid-cols-12" appInfiniteScroll (onScroll)="loadAnime()">
        @for (item of (listAnime()); track $index) {
            <div class="col-span-12 md:col-span-4 lg:col-span-3">
                <app-animecard [anime]="item"></app-animecard>
            </div>
        }
    </div>
<div class="py-4">
    <button class="px-4 py-2 border border-cyan-500 cursor-pointer" (click)="loadAnime()">Carica altre anime</button>
</div>    
</div>
